<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Coffee Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.card img {
  height: 200px;
  object-fit: cover;
}
.card:hover {
  transform: scale(1.03);
  transition: 0.3s;
}
</style>
</head>

<body>

<!--  Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container d-flex justify-content-between">
    <span class="navbar-brand">☕ Coffee Shop</span>
    <h2 class="text-white text-center">☕Menu☕</h2>
    <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#cartModal">
      🛒 Item (<span id="cart-count">0</span>)
    </button>
  </div>
</nav>

<!--  Product -->
<div class="container py-5">
  <div class="row g-4" id="card-container"></div>
</div>

<!-- Cart Modal -->
<div class="modal fade" id="cartModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>🛒 Your items</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="cart-items"></div>

      <div class="modal-footer">
        <h6>Total: <span id="cart-total">$0</span></h6>
        <button class="btn btn-success" onclick="checkout()">Checkout</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Product Data (8 items)
  const products = [
    { id: 1, name: "Coffee", price: 2.5, img: "https://mp-cms.medparkhospital.com/assets/f7ee9aa0-5b29-4a93-a09b-f971e3c7d0ce/-------coffee.jpeg?format=jpg&quality=50&width=600&height=600&fit=inside" },
    { id: 2, name: "Milk Tea", price: 3.0, img: "https://worldlytreat.com/wp-content/uploads/2024/04/Tiger-milk-tea-3.jpg" },
    { id: 3, name: "Green Tea", price: 2.0, img: "https://cdn.shopify.com/s/files/1/0655/8279/2933/files/Macha_latte-1_480x480.webp?v=1697619272" },
    { id: 4, name: "Latte", price: 3.5, img: "https://upload.wikimedia.org/wikipedia/commons/d/d8/Caffe_Latte_at_Pulse_Cafe.jpg" },
    { id: 5, name: "Cappuccino", price: 3.2, img: "https://images.unsplash.com/photo-1504754524776-8f4f37790ca0?w=400" },
    { id: 6, name: "Espresso", price: 2.8, img: "https://paxandbeneficia.com/cdn/shop/articles/espresso.webp?v=1694780744" },
    { id: 7, name: "Mocha", price: 3.6, img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400" },
    { id: 8, name: "Americano", price: 2.7, img: "https://images.unsplash.com/photo-1470337458703-46ad1756a187?w=400" }
  ];
// Load cart from localStorage
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("card-container");

// Display Products
function displayProducts() {
  products.forEach(p => {
    container.innerHTML += `
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card shadow h-100">
          <img src="${p.img}" class="card-img-top">
          <div class="card-body text-center">
            <h5>${p.name}</h5>
            <p class="text-success">$${p.price}</p>
            <button class="btn btn-dark w-100" onclick="addToCart(${p.id})">Add</button>
          </div>
        </div>
      </div>
    `;
  });
}

// Add to Cart
function addToCart(id) {
  const product = products.find(p => p.id === id);
  cart.push(product);
  saveCart();
}

// Save + Update
function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

// Update UI
function updateCart() {
  document.getElementById("cart-count").innerText = cart.length;

  let total = 0;
  let html = "";

  cart.forEach((item, index) => {
    total += item.price;

    html += `
      <div class="d-flex justify-content-between mb-2">
        <span>${item.name} - $${item.price}</span>
        <button class="btn btn-sm btn-danger" onclick="removeItem(${index})">X</button>
      </div>
    `;
  });

  document.getElementById("cart-items").innerHTML = html;
  document.getElementById("cart-total").innerText = "$" + total.toFixed(2);
}

// Remove Item
function removeItem(index) {
  cart.splice(index, 1);
  saveCart();
}

// Checkout
function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  alert("Order successful! 🎉");
  cart = [];
  saveCart();
}

// Init
displayProducts();
updateCart();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
